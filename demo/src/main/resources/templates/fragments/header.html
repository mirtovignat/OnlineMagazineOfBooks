<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="header">
    <header>
        <h1 class="logo-link"><a href="/user/movies">🎬 Cinema Service</a></h1>
        <div class="header-actions">
            <a th:href="@{/user/favourites}" class="action-button favourites-btn" title="Избранное">♥
                <span id="favourites-count" class="count-badge">0</span>
            </a>
            <a th:href="@{/user/cart}" class="action-button cart-btn" title="Корзина">🛒
                <span id="cart-count" class="count-badge">0</span>
            </a>
            <div class="user-menu" id="userMenu">
                <div class="user-menu-toggle" onclick="toggleUserMenu()">
                    <img th:src="@{/images/user-icon.png}" alt="Пользователь" class="user-icon">
                    <span class="toggle-icon">▼</span>
                </div>
                <div class="user-dropdown">
                    <a th:href="@{/personal-account}">Личный кабинет</a>
                    <a th:href="@{/profile/settings}">Настройки⚙️</a>
                    <a th:href="@{/user/top-up}">Пополнить💰</a>
                    <form th:action="@{/logout}" method="post" style="margin:0;">
                        <button type="submit" class="logout-btn">Выйти</button>
                    </form>
                </div>
            </div>
        </div>
    </header>
</div>

<script>
    function updateBadges() {
        fetch('/user/cart/count')
            .then(r => r.text())
            .then(c => {
                let badge = document.getElementById('cart-count');
                if (badge) {
                    badge.innerText = c;
                    badge.style.display = c !== '0' ? 'flex' : 'none';
                }
            })
            .catch(e => console.warn);
        fetch('/user/favourites/count')
            .then(r => r.text())
            .then(c => {
                let badge = document.getElementById('favourites-count');
                if (badge) {
                    badge.innerText = c;
                    badge.style.display = c !== '0' ? 'flex' : 'none';
                }
            })
            .catch(e => console.warn);
    }

    function toggleUserMenu() {
        let menu = document.getElementById('userMenu');
        if (menu) menu.classList.toggle('show');
    }

    updateBadges();
    window.addEventListener('pageshow', updateBadges);
    window.addEventListener('popstate', updateBadges);
    document.addEventListener('click', function(e) {
        let menu = document.getElementById('userMenu');
        if (menu && !menu.contains(e.target)) menu.classList.remove('show');
    });
</script>
</body>
</html>
