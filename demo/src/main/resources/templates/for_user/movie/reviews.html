<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Отзывы о фильме — Cinema Service</title>
    <link rel="icon" th:href="@{/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .reviews-container{max-width:900px;margin:2rem auto;padding:0 1.5rem;}
        .movie-title{font-size:2rem;margin-bottom:1.5rem;border-bottom:2px solid var(--glow-primary);padding-bottom:0.75rem;}
        .back-link{display:inline-block;margin-bottom:1rem;color:#c084fc;text-decoration:none;}
        .reviews-grid{display:flex;flex-direction:column;gap:1.5rem;margin-top:1.5rem;}
        .review-card{background:var(--card-bg);border-radius:24px;padding:1.5rem;border:1px solid var(--glass-border);}
        .review-header{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}
        .review-author{font-weight:bold;color:#c084fc;}
        .review-rating{background:rgba(251,191,36,0.2);color:#fde047;padding:0.2rem 0.8rem;border-radius:40px;font-size:0.9rem;}
        .review-date{color:var(--text-muted);font-size:0.8rem;margin-left:auto;}
        .review-text{line-height:1.6;}
        .no-reviews{text-align:center;padding:3rem;background:var(--card-bg);border-radius:32px;}
        .add-review-btn { background:#3b82f6; color:white; border:none; padding:0.4rem 1rem; border-radius:2rem; cursor:pointer; margin-bottom:1rem; }
        .edit-review-btn, .delete-review-btn { background:none; border:none; cursor:pointer; margin-left:0.5rem; }
        .edit-review-btn { color:#fbbf24; }
        .delete-review-btn { color:#f43f5e; }
        .your-review-badge { background:#3b82f6; color:white; padding:0.2rem 0.6rem; border-radius:2rem; font-size:0.7rem; margin-left:0.5rem; }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<th:block th:replace="~{fragments/flash-messages :: flashMessages}"></th:block>

<main class="reviews-container">
    <a href="javascript:history.back()" class="back-link">← Назад</a>
    <h1 class="movie-title" th:text="'Отзывы на фильм: ' + ${title}">Отзывы</h1>

    <div th:if="${!isRatedByCurrentUser}">
        <button class="add-review-btn" th:data-movie-title="${title}" onclick="showRatingModal(this, 'add', 5.0, '')">➕ Оставить отзыв</button>
    </div>

    <div th:if="${reviews != null and !reviews.empty}" class="reviews-grid">
        <div class="review-card" th:each="review : ${reviews}" th:id="'review-' + ${review.username}">
            <div class="review-header">
                <span class="review-author" th:text="${review.username}"></span>
                <span class="review-rating" th:text="${review.ratingValue} + ' / 10'"></span>
                <span class="review-date" th:text="${#temporals.format(review.ratedAt, 'dd.MM.yyyy HH:mm')}"></span>
                <div th:if="${review.username == currentUsername}">
                    <span class="your-review-badge">Ваш отзыв</span>
                    <button class="edit-review-btn"
                            th:data-review-rating="${review.ratingValue}"
                            th:data-review-text="${review.reviewText}"
                            th:data-movie-title="${title}"
                            onclick="showRatingModal(this, 'edit', parseFloat(this.getAttribute('data-review-rating')), this.getAttribute('data-review-text') || '')">✏️</button>
                    <button class="delete-review-btn" th:data-movie-title="${title}" onclick="deleteRating(this.getAttribute('data-movie-title'))">🗑️</button>
                </div>
            </div>
            <div class="review-text" th:if="${review.reviewText != null and !review.reviewText.empty}" th:text="${review.reviewText}"></div>
            <div class="review-text" th:unless="${review.reviewText != null and !review.reviewText.empty}" style="color:#94a3b8; font-style:italic;">Пользователь не оставил текстового отзыва.</div>
        </div>
    </div>

    <div th:if="${reviews == null or reviews.isEmpty()}" class="no-reviews">
        <p>😕 Пока нет отзывов на этот фильм.</p>
        <p th:if="${!isRatedByCurrentUser}">Будьте первым, кто оставит отзыв!</p>
    </div>
</main>

<th:block th:replace="~{fragments/modals :: ratingModal}"></th:block>
<th:block th:replace="~{fragments/modals :: confirmDeleteModal}"></th:block>
<script th:src="@{/js/main.js}" defer></script>
</body>
</html>
