<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Фильмы — Cinema Service</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<th:block th:replace="~{fragments/flash-messages :: flashMessages}"></th:block>
<main>
    <div class="movies-grid" th:if="${cardsPage != null and !cardsPage.empty}">
        <div class="movie-card" th:each="movie : ${cardsPage.content}">
            <a class="movie-poster-link" th:href="@{/user/movies/{title}(title=${movie.title})}">
                <div class="movie-poster-placeholder"><span>📽️ Постер</span></div>
            </a>
            <div class="movie-card-content">
                <h3><a th:href="@{/user/movies/{title}(title=${movie.title})}" th:text="${movie.title}">Название</a>
                </h3>
                <div class="badges">
                    <span class="badge rating" th:attr="data-movie-title=${movie.title}"
                          th:text="${movie.rating != null ? movie.rating : '-'}">-</span>
                    <span class="badge year" th:text="${movie.releaseYear}">2013</span>
                    <span class="badge genre" th:text="${movie.genre}">Комедия</span>
                </div>
                <p class="price" th:text="${movie.price + ' ₽'}">329.99 ₽</p>
                <div class="movie-actions">
                    <button class="icon-btn favourite-btn" th:classappend="${movie.inFavourites} ? 'active' : ''"
                            th:data-movie-title="${movie.title}"
                            th:data-action="${movie.inFavourites} ? 'remove' : 'add'" onclick="toggleFavourite(this)"
                            title="Добавить в избранное"><span th:text="${movie.inFavourites} ? '♥' : '♡'"></span>
                    </button>
                    <button class="icon-btn rating-btn" th:data-movie-title="${movie.title}"
                            onclick="showRatingModal(this, 'add', 5.0, '')" title="Оценить фильм">☆
                    </button>
                    <a th:href="@{/user/rated/{title}/reviews(title=${movie.title})}" class="icon-btn comment-btn"
                       title="Отзывы">💬</a>
                </div>
                <div class="purchase-buttons">
                    <div th:if="${!movie.bought}">
                        <div th:if="${!movie.inCart}">
                            <button class="cart-button to-cart-btn-details" th:data-movie-title="${movie.title}"
                                    onclick="addToCart(this)">В корзину
                            </button>
                        </div>
                        <div th:if="${movie.inCart}">
                            <button class="cart-button in-cart-btn-details" onclick="window.location.href='/user/cart'">
                                В корзине<br/><span class="go-to-cart">Перейти</span></button>
                        </div>
                    </div>
                    <div th:if="${!movie.bought}">
                        <button class="buy-now-btn" th:data-movie-title="${movie.title}"
                                th:data-movie-price="${movie.price}" onclick="showBuyModal(this)">Купить сейчас
                        </button>
                    </div>
                    <div th:if="${movie.bought}">
                        <button class="bought-btn" onclick="window.location.href='/user/purchases/library'">В библиотеке<br/><span
                                class="go-to-cart">Смотреть</span></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${cardsPage == null or cardsPage.empty}" style="text-align:center; padding:4rem 2rem;"><h2
            style="color:#64748b;">Фильмы не найдены</h2></div>
    <div class="pagination" th:if="${cardsPage != null and !cardsPage.empty and cardsPage.totalPages > 1}">
        <a th:if="${cardsPage.hasPrevious()}"
           th:href="@{/user/movies(page=${cardsPage.number - 1}, size=${cardsPage.size})}">« Предыдущая</a>
        <span>Страница <span th:text="${cardsPage.number + 1}">1</span> из <span
                th:text="${cardsPage.totalPages}">1</span></span>
        <a th:if="${cardsPage.hasNext()}"
           th:href="@{/user/movies(page=${cardsPage.number + 1}, size=${cardsPage.size})}">Следующая »</a>
    </div>
</main>

<th:block th:replace="~{fragments/modals :: buyModal}"></th:block>
<th:block th:replace="~{fragments/modals :: ratingModal}"></th:block>

<script th:src="@{/js/main.js}" defer></script>
<script th:src="@{/js/main.js}" defer>
    document.addEventListener('submit', function(e) {
        if (e.target && e.target.id === 'ratingForm') {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
    }, true);

    if (typeof submitRating === 'function') {
        const originalSubmitRating = submitRating;
        window.submitRating = function(...args) {
            const result = originalSubmitRating(...args);
            if (result && result.catch) result.catch(console.warn);
            return false;
        };
    }
</script>
</body>
</html>
