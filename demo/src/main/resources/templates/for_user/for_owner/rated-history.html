<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мои оценки — Cinema Service</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .history-container{max-width:1200px;margin:2rem auto;padding:0 2rem;}
        .history-container h1{font-size:2.5rem;font-weight:700;background:linear-gradient(135deg,#e0e7ff,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:2rem;}
        .history-table{width:100%;border-collapse:separate;border-spacing:0 0.75rem;}
        .history-table thead th{text-align:left;padding:1rem 1.5rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;font-size:0.8rem;letter-spacing:0.5px;}
        .history-table tbody tr{background:var(--card-bg);backdrop-filter:blur(4px);border-radius:20px;transition:all 0.2s;}
        .history-table tbody tr:hover{transform:scale(1.005);box-shadow:0 8px 20px rgba(0,0,0,0.3);}
        .history-table td{padding:1.25rem 1.5rem;border-top:1px solid rgba(255,255,255,0.05);vertical-align:top;}
        .history-table td:first-child{border-top-left-radius:20px;border-bottom-left-radius:20px;}
        .history-table td:last-child{border-top-right-radius:20px;border-bottom-right-radius:20px;}
        .movie-link{color:#c084fc;font-weight:600;text-decoration:none;}.movie-link:hover{text-decoration:underline;}
        .rating-value{display:inline-block;background:#fbbf24;color:#1e1b2f;font-weight:700;padding:0.2rem 0.6rem;border-radius:40px;font-size:0.85rem;}
        .film-rating{color:#fcd34d;font-weight:500;}
        .review-text{max-width:250px;white-space:normal;word-break:break-word;font-size:0.9rem;color:#cbd5e1;}
        .empty-state{text-align:center;padding:4rem 2rem;background:var(--card-bg);border-radius:32px;border:1px solid var(--glass-border);}
        .empty-state p{color:var(--text-muted);font-size:1.2rem;margin-bottom:2rem;}
        .btn{background:var(--glow-primary);color:white;padding:0.9rem 2.2rem;border-radius:60px;text-decoration:none;font-weight:600;display:inline-block;transition:0.2s;}
        .btn:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(59,130,246,0.4);}
        .pagination{display:flex;justify-content:center;align-items:center;gap:1rem;margin-top:2rem;}
        .pagination a,.pagination span{padding:0.6rem 1.2rem;border-radius:40px;border:1px solid var(--glass-border);background:var(--card-bg);color:var(--text-light);text-decoration:none;transition:0.2s;}
        .pagination a:hover{background:var(--glow-primary);border-color:var(--glow-primary);color:white;}
        @media (max-width:768px){.history-table,.history-table thead,.history-table tbody,.history-table tr,.history-table td{display:block;}.history-table thead{display:none;}.history-table tbody tr{margin-bottom:1rem;padding:1rem;border-radius:20px;}.history-table td{padding:0.75rem 0;border:none;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;}.history-table td::before{content:attr(data-label);font-weight:600;color:var(--text-muted);width:35%;flex-shrink:0;}.review-text{max-width:65%;}}
    </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<th:block th:replace="~{fragments/flash-messages :: flashMessages}"></th:block>
<main class="history-container">
    <h1>Мои оценки фильмов</h1>
    <div th:if="${ratedHistory != null and not ratedHistory.empty}">
        <table class="history-table">
            <thead>
            <tr>
                <th>Название фильма</th>
                <th>Моя оценка</th>
                <th>Мой отзыв</th>
                <th>Дата оценки</th>
                <th>Рейтинг фильма</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="rated : ${ratedHistory.content}">
                <td data-label="Название"><a th:href="@{/user/movies/{title}(title=${rated.title})}" class="movie-link"
                                             th:text="${rated.title}">Название</a>
                    <div class="movie-meta" style="font-size:0.75rem; color:#7e8a98; margin-top:4px;"><span
                            th:text="${rated.releaseDate} ? ${#temporals.format(rated.releaseDate, 'yyyy')} : ''">2025</span><span
                            th:text="| • ${rated.genre}|" th:if="${rated.genre != null}"></span><span
                            th:text="| • ${rated.formattedDuration}|" th:if="${rated.formattedDuration != null}"></span>
                    </div>
                </td>
                <td data-label="Моя оценка"><span class="rating-value" th:text="${rated.ratingValue}">8.5</span> / 10
                </td>
                <td data-label="Мой отзыв">
                    <div class="review-text"
                         th:if="${rated.reviewText != null and not #strings.isEmpty(rated.reviewText)}"
                         th:text="${rated.reviewText}">Отличный фильм!
                    </div>
                    <span th:if="${rated.reviewText == null or #strings.isEmpty(rated.reviewText)}"
                          style="color:#5b6e8c; font-style:italic;">— нет отзыва —</span></td>
                <td data-label="Дата оценки"><span th:text="${#temporals.format(rated.ratedAt, 'dd MMM yyyy, HH:mm')}">15 мар 2025, 18:30</span>
                </td>
                <td data-label="Рейтинг фильма"><span class="film-rating"
                                                      th:text="${#numbers.formatDecimal(rated.rating, 1, 1)}">7.9</span>
                    / 10 <span style="font-size:0.7rem; color:#6c7a91;">(<span
                            th:text="${rated.ratingsCount}">124</span> оценок)</span></td>
            </tr>
            </tbody>
        </table>
        <div class="pagination" th:if="${ratedHistory.totalPages > 1}"><a th:if="${ratedHistory.hasPrevious()}"
                                                                          th:href="@{/user/ratings(page=${ratedHistory.number - 1}, size=${ratedHistory.size})}">«
            Предыдущая</a><span>Страница <span th:text="${ratedHistory.number + 1}">1</span> из <span
                th:text="${ratedHistory.totalPages}">1</span></span><a th:if="${ratedHistory.hasNext()}"
                                                                       th:href="@{/user/ratings(page=${ratedHistory.number + 1}, size=${ratedHistory.size})}">Следующая
            »</a></div>
    </div>
    <div th:if="${ratedHistory == null or ratedHistory.empty}" class="empty-state"><p>Вы ещё не оценили ни одного
        фильма</p><a href="/user/movies" class="btn">Перейти к каталогу</a></div>
</main>
<script th:src="@{/js/main.js}" defer></script>
</body>
</html>
