<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя библиотека — Cinema Service</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .library-header{text-align:center;padding:2rem 1rem;}
        .library-header h2{font-size:2.5rem;font-weight:700;background:linear-gradient(135deg,#e0e7ff,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:0.5rem;}
        .library-count{display:inline-block;background:var(--card-bg);padding:0.5rem 1.5rem;border-radius:60px;border:1px solid var(--glass-border);}
        .library-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2rem;padding:2rem;max-width:1400px;margin:0 auto;}
        .movie-card{background:var(--card-bg);backdrop-filter:blur(8px);border-radius:var(--radius-xl);overflow:hidden;border:1px solid var(--glass-border);transition:all 0.3s ease;display:flex;flex-direction:column;height:100%;opacity:0;transform:translateY(20px);animation:fadeSlideUp 0.5s ease forwards;}
        @keyframes fadeSlideUp{to{opacity:1;transform:translateY(0);}}
        .movie-card:hover{transform:translateY(-8px);border-color:var(--glow-success);box-shadow:var(--shadow-xl);}
        .movie-poster-placeholder{width:100%;aspect-ratio:2/3;background:#2d3748;background-image:linear-gradient(145deg,#2d3748 0%,#1a202c 100%);display:flex;align-items:center;justify-content:center;color:#718096;font-size:0.9rem;text-align:center;padding:1rem;border-bottom:1px solid var(--glass-border);}
        .movie-card-content{padding:1.5rem;flex-grow:1;display:flex;flex-direction:column;}
        .movie-card-content h3{font-size:1.3rem;font-weight:600;margin-bottom:0.75rem;color:var(--text-light);}
        .movie-meta{display:flex;flex-wrap:wrap;gap:0.5rem;margin:0.75rem 0;}
        .movie-meta span{padding:0.25rem 0.75rem;border-radius:30px;font-size:0.8rem;font-weight:500;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);}
        .movie-genre{background:rgba(96,165,250,0.2) !important;color:#93c5fd !important;}
        .movie-rating{background:rgba(251,191,36,0.2) !important;color:#fde047 !important;}
        .movie-price{font-size:1.5rem;font-weight:700;color:#c084fc;margin:0.5rem 0;}
        .movie-description{color:var(--text-muted);font-size:0.95rem;line-height:1.6;margin:0.75rem 0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
        .movie-card-content a{display:inline-block;margin-top:1rem;color:#c084fc;font-weight:500;text-decoration:none;transition:0.2s;}
        .movie-card-content a:hover{color:var(--glow-primary);text-decoration:underline;}
        .empty-library-message{text-align:center;padding:5rem 1rem;}
        .empty-library-message h3{font-size:2rem;color:var(--text-muted);}
        .browse-movies-btn{background:var(--glow-primary);color:white;padding:1rem 2.5rem;border-radius:60px;text-decoration:none;font-weight:600;display:inline-block;margin-top:2rem;transition:0.2s;}
        .browse-movies-btn:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(59,130,246,0.4);}
        .pagination{display:flex;justify-content:center;align-items:center;gap:1rem;padding:2rem;}
        .pagination a,.pagination span{padding:0.6rem 1.2rem;border-radius:30px;border:1px solid var(--glass-border);background:var(--card-bg);color:var(--text-light);text-decoration:none;transition:0.2s;}
        .pagination a:hover{background:var(--glow-primary);color:white;border-color:var(--glow-primary);}
        @media (max-width:768px){.library-grid{padding:1rem;}}
    </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<th:block th:replace="~{fragments/flash-messages :: flashMessages}"></th:block>
<div class="library-header"><h2>📚 Моя библиотека</h2>
    <div class="library-count">Всего фильмов: <span th:text="${library != null ? library.totalElements : 0}">0</span>
    </div>
</div>
<main>
    <div th:if="${library == null or library.isEmpty()}" class="empty-library-message"><h3>😔 Библиотека пуста</h3>
        <p style="color:var(--text-muted);">Вы еще не купили ни одного фильма.</p><a th:href="@{/user/movies}"
                                                                                     class="browse-movies-btn">Перейти к
            каталогу</a></div>
    <div th:unless="${library == null or library.isEmpty()}">
        <div class="library-grid">
            <div class="movie-card" th:each="movie : ${library.content}"
                 th:style="'animation-delay: ' + (${movieStat.index} * 0.05) + 's'">
                <div class="movie-poster-placeholder"><span>📽️ Постер</span></div>
                <div class="movie-card-content">
                    <h3 th:text="${movie.title}">Название фильма</h3>
                    <div class="movie-meta"><span class="movie-genre" th:text="${movie.genre}">Жанр</span><span
                            class="movie-rating" th:text="'⭐ ' + ${movie.rating}">8.5</span><span
                            th:text="${movie.releaseDate}">2023</span><span th:text="${movie.formattedDuration}">2ч 15мин</span>
                    </div>
                    <div class="movie-price" th:text="${movie.price + ' ₽'}">329.99 ₽</div>
                    <div class="movie-description" th:text="${movie.description}">Краткое описание...</div>
                    <div class="movie-meta" style="margin-top:10px;"><span
                            th:text="'Куплено: ' + ${movie.purchasesCount} + ' раз'">0</span><span
                            th:text="'Отзывов: ' + ${movie.reviewCount}">0</span></div>
                    <a th:href="@{/user/movies/{title}(title=${movie.title})}">Подробнее</a>
                </div>
            </div>
        </div>
        <div th:if="${library.totalPages > 1}" class="pagination">
            <a th:if="${library.hasPrevious()}" th:href="@{/user/purchases/library(page=${library.number - 1})}">←
                Предыдущая</a>
            <span th:unless="${library.hasPrevious()}" class="disabled">← Предыдущая</span>
            <span th:each="i : ${#numbers.sequence(0, library.totalPages - 1)}"><a th:if="${i == library.number}"
                                                                                   class="current"
                                                                                   th:text="${i + 1}">1</a><a
                    th:unless="${i == library.number}" th:href="@{/user/purchases/library(page=${i})}"
                    th:text="${i + 1}">2</a></span>
            <a th:if="${library.hasNext()}" th:href="@{/user/purchases/library(page=${library.number + 1})}">Следующая
                →</a>
            <span th:unless="${library.hasNext()}" class="disabled">Следующая →</span>
        </div>
    </div>
</main>
<script th:src="@{/js/main.js}" defer></script>
</body>
</html>
