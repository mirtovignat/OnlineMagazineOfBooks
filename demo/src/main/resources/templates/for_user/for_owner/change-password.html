<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Смена пароля — Cinema Service</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0b0f1c, #05070f);
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(72, 187, 255, 0.25);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; text-align: center; background: linear-gradient(135deg, #e0e7ff, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; }
        label { display: block; margin-top: 1rem; margin-bottom: 0.3rem; font-weight: 500; }
        .input-wrapper { position: relative; width: 100%; }
        input { width: 100%; padding: 0.8rem 2.5rem 0.8rem 1rem; border-radius: 60px; border: 1px solid rgba(72, 187, 255, 0.25); background: rgba(0,0,0,0.3); color: white; font-size: 1rem; }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
        .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }
        button[type="submit"] { width: 100%; margin-top: 1.5rem; padding: 0.8rem; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; border: none; border-radius: 60px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(59,130,246,0.4); }
        .error-msg { color: #f43f5e; font-size: 0.75rem; margin-top: 0.2rem; display: none; }
        .flash-message {
            margin-bottom: 1rem;
            padding: 0.8rem 1rem;
            border-radius: 60px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            font-size: 0.85rem;
            border-left: 4px solid;
        }
        .flash-message.success { border-color: #10b981; color: #a7f3d0; }
        .flash-message.error { border-color: #f43f5e; color: #fecdd3; }
        .back-link { display: block; text-align: center; margin-top: 1.5rem; color: #c084fc; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <h1>Смена пароля</h1>
    <div th:if="${successMessage}" class="flash-message success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="flash-message error" th:text="${errorMessage}"></div>
    <div th:if="${infoMessage}" class="flash-message success" th:text="${infoMessage}"></div>
    <div th:if="${alreadyRegisteredExceptionMessage}" class="flash-message error"
         th:text="${alreadyRegisteredExceptionMessage}"></div>
    <div th:if="${invalidPasswordExceptionMessage}" class="flash-message error"
         th:text="${invalidPasswordExceptionMessage}"></div>

    <form th:action="@{/profile/settings/change/pwd}" th:object="${passwordChangingDTO}" method="post" id="pwdForm">
        <label>Текущий пароль</label>
        <div class="input-wrapper">
            <input type="password" th:field="*{currentPassword}" id="currentPassword" required autocomplete="off"
                   oncopy="return false" oncut="return false" onpaste="return false">
            <button type="button" class="toggle-password" data-target="currentPassword">👁</button>
        </div>
        <label>Новый пароль</label>
        <div class="input-wrapper">
            <input type="password" th:field="*{rawPassword}" id="rawPassword" required autocomplete="off"
                   oncopy="return false" oncut="return false" onpaste="return false">
            <button type="button" class="toggle-password" data-target="rawPassword">👁</button>
        </div>
        <div id="newPwdError" class="error-msg"></div>
        <label>Повторите новый пароль</label>
        <div class="input-wrapper">
            <input type="password" th:field="*{repeatRawPassword}" id="repeatRawPassword" required autocomplete="off"
                   oncopy="return false" oncut="return false" onpaste="return false">
            <button type="button" class="toggle-password" data-target="repeatRawPassword">👁</button>
        </div>
        <div id="repeatError" class="error-msg"></div>
        <button type="submit">Изменить пароль</button>
    </form>
    <a href="/personal-account" class="back-link">← Вернуться в личный кабинет</a>
</div>

<script>
    // Глазки для показа/скрытия пароля
    document.querySelectorAll('.toggle-password').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            const targetId = this.getAttribute('data-target');
            if (targetId) {
                const input = document.getElementById(targetId);
                if (input) {
                    if (input.type === 'password') {
                        input.type = 'text';
                        this.textContent = '🙈';
                    } else {
                        input.type = 'password';
                        this.textContent = '👁';
                    }
                }
            }
        });
    });

    // Валидация перед отправкой
    const form = document.getElementById('pwdForm');
    const newPwd = document.getElementById('rawPassword');
    const repeatPwd = document.getElementById('repeatRawPassword');
    const newError = document.getElementById('newPwdError');
    const repeatError = document.getElementById('repeatError');

    form.addEventListener('submit', function(e) {
        let valid = true;
        newError.style.display = 'none';
        repeatError.style.display = 'none';
        if (newPwd.value.length < 8) {
            newError.textContent = 'Пароль должен быть не менее 8 символов';
            newError.style.display = 'block';
            valid = false;
        }
        if (newPwd.value !== repeatPwd.value) {
            repeatError.textContent = 'Пароли не совпадают';
            repeatError.style.display = 'block';
            valid = false;
        }
        if (!valid) e.preventDefault();
    });
</script>
</body>
</html>
