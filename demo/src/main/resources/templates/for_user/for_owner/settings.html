<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Настройки профиля — Cinema Service</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:radial-gradient(circle at 10% 20%,#0b0f1c,#05070f);color:#eef2ff;line-height:1.5;min-height:100vh;}
        :root{--glass-bg:rgba(18,25,45,0.65);--glass-border:rgba(72,187,255,0.25);--glow-primary:#3b82f6;--glow-success:#10b981;--glow-danger:#f43f5e;--text-light:#e2e8f0;--text-muted:#94a3b8;--card-bg:rgba(15,23,42,0.75);--shadow-xl:0 25px 45px -12px rgba(0,0,0,0.5);--radius-xl:28px;}
        header{position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;background:rgba(8,12,24,0.7);backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-border);box-shadow:0 8px 20px rgba(0,0,0,0.2);}
        .logo-link a{display:flex;align-items:center;gap:0.75rem;text-decoration:none;font-weight:700;font-size:1.5rem;background:linear-gradient(135deg,#c084fc,#60a5fa);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .logo-link img{width:32px;height:32px;border-radius:12px;}
        .header-actions{display:flex;align-items:center;gap:1rem;}
        .user-menu{position:relative;}
        .user-menu-toggle{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 1rem;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:60px;cursor:pointer;backdrop-filter:blur(4px);}
        .user-menu-toggle:hover{border-color:var(--glow-primary);}
        .user-icon{width:28px;height:28px;border-radius:50%;}
        .toggle-icon{font-size:0.8rem;transition:transform 0.2s;}
        .user-menu.show .toggle-icon{transform:rotate(180deg);}
        .user-dropdown{position:absolute;top:calc(100% + 0.75rem);right:0;min-width:200px;background:rgba(10,15,30,0.95);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:24px;box-shadow:var(--shadow-xl);opacity:0;visibility:hidden;transform:translateY(-10px);transition:all 0.2s;z-index:100;}
        .user-menu.show .user-dropdown{opacity:1;visibility:visible;transform:translateY(0);}
        .user-dropdown a,.user-dropdown button{display:block;width:100%;padding:0.75rem 1.5rem;text-align:left;background:none;border:none;color:var(--text-light);text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background 0.15s;}
        .user-dropdown a:hover,.user-dropdown button:hover{background:rgba(59,130,246,0.2);}
        .logout-btn{color:var(--glow-danger) !important;}
        .flash-message{position:fixed;top:90px;right:20px;z-index:100;display:flex;align-items:center;gap:0.75rem;padding:1rem 1.5rem;border-radius:60px;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);font-weight:500;max-width:400px;border-left:4px solid;animation:slideIn 0.3s ease,fadeOut 0.3s ease 4s forwards;}
        .flash-message.success{border-color:var(--glow-success);color:#a7f3d0;}
        .flash-message.error{border-color:var(--glow-danger);color:#fecdd3;}
        .flash-message.info{border-color:#f59e0b;color:#fef3c7;}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
        @keyframes fadeOut{to{opacity:0;visibility:hidden;}}
        .container{max-width:600px;margin:2rem auto;padding:0 2rem;}
        h1{font-size:2rem;margin-bottom:2rem;background:linear-gradient(135deg,#e0e7ff,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .settings-card{background:var(--card-bg);backdrop-filter:blur(8px);border-radius:var(--radius-xl);padding:2rem;border:1px solid var(--glass-border);}
        .wallet-info{background:rgba(0,0,0,0.3);border-radius:20px;padding:1rem 1.5rem;margin-bottom:2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
        .wallet-label{font-weight:600;color:var(--text-muted);}
        .wallet-value{font-weight:700;color:var(--text-light);}
        .wallet-balance{color:var(--glow-success);}
        .form-group{margin-bottom:1.5rem;}
        .form-group label{display:block;margin-bottom:0.5rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;font-size:0.75rem;letter-spacing:0.5px;}
        .form-control{width:100%;padding:0.8rem 1rem;border:1px solid var(--glass-border);border-radius:60px;font-size:1rem;transition:0.2s;background:rgba(0,0,0,0.4);color:white;}
        .form-control:focus{outline:none;border-color:var(--glow-primary);box-shadow:0 0 0 2px rgba(59,130,246,0.3);}
        .form-control.is-invalid{border-color:var(--glow-danger);}
        .error-message{color:var(--glow-danger);font-size:0.85rem;margin-top:0.3rem;}
        .form-actions{display:flex;gap:1rem;margin-top:2rem;}
        .btn{display:inline-block;padding:0.8rem 2rem;border-radius:60px;font-weight:600;text-decoration:none;text-align:center;transition:0.2s;border:none;cursor:pointer;font-size:1rem;}
        .btn-primary{background:linear-gradient(135deg,var(--glow-primary),#1d4ed8);color:white;flex:1;}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(59,130,246,0.4);}
        .btn-secondary{background:rgba(255,255,255,0.1);color:var(--text-light);border:1px solid var(--glass-border);flex:1;}
        .btn-secondary:hover{background:rgba(255,255,255,0.2);}
        @media (max-width:768px){header{flex-direction:column;align-items:stretch;}.header-actions{justify-content:center;}.container{padding:0 1rem;}}
    </style>
</head>
<body>
<header>
    <h1 class="logo-link"><a href="/user/movies"><img src="/static/favicon.ico" alt="">Cinema Service</a></h1>
    <div class="header-actions">
        <div class="user-menu" id="userMenu">
            <div class="user-menu-toggle" onclick="toggleUserMenu()"><img th:src="@{/images/user-icon.png}"
                                                                          alt="Пользователь" class="user-icon"><span
                    class="toggle-icon">▼</span></div>
            <div class="user-dropdown">
                <a th:href="@{/personal-account}">Личный кабинет</a>
                <a th:href="@{/profile/settings}">Настройки⚙️</a>
                <a th:href="@{/user/top-up}">Пополнить💰</a>
                <form th:action="@{/logout}" method="post" style="margin:0;">
                    <button type="submit" class="logout-btn">Выйти</button>
                </form>
            </div>
        </div>
    </div>
</header>
<main class="container">
    <h1>Настройки профиля</h1>
    <div th:if="${successMessage}" class="flash-message success" th:text="${successMessage}"></div>
    <div th:if="${frozenBuyerExceptionMessage}" class="flash-message error"
         th:text="${frozenBuyerExceptionMessage}"></div>
    <div th:if="${notAuthorizedUserExceptionMessage}" class="flash-message error"
         th:text="${notAuthorizedUserExceptionMessage}"></div>
    <div th:if="${notAuthorizedWalletExceptionMessage}" class="flash-message error"
         th:text="${notAuthorizedWalletExceptionMessage}"></div>
    <div th:if="${walletDoesNotExistsExceptionMessage}" class="flash-message error"
         th:text="${walletDoesNotExistsExceptionMessage}"></div>
    <div th:if="${validationError}" class="flash-message error" th:text="${validationError}"></div>
    <div th:if="${passwordsMismatchExceptionMessage}" class="flash-message error"
         th:text="${passwordsMismatchExceptionMessage}"></div>
    <div th:if="${alreadyRegisteredExceptionMessage}" class="flash-message error"
         th:text="${alreadyRegisteredExceptionMessage}"></div>
    <div th:if="${infoMessage}" class="flash-message info" th:text="${infoMessage}"></div>
    <div class="settings-card">
        <div class="wallet-info" th:if="${wallet != null}">
            <span class="wallet-label">Текущий пользователь:</span>
            <div th:if="${wallet.username != null}"><span class="wallet-value" th:text="${wallet.username}">Имя пользователя</span>
            </div>
            <div th:if="${wallet.fullName != null}"><span class="wallet-value" th:text="${wallet.fullName}">Имя владельца</span><span
                    class="wallet-balance">Баланс: <span th:text="${wallet.balance}">0</span> ₽</span></div>
            <div th:if="${wallet.username == null and wallet.fullName == null}"><span class="wallet-value"
                                                                                      th:text="${wallet}">Неизвестно</span>
            </div>
        </div>
        <form th:action="@{/profile/settings/change}" method="post" th:object="${profileSettingsDTO}">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" class="form-control" th:field="*{username}"
                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                       placeholder="Введите имя пользователя"/>
                <div class="error-message" th:if="${#fields.hasErrors('username')}"
                     th:each="err : ${#fields.errors('username')}" th:text="${err}"></div>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                       placeholder="example@mail.com"/>
                <div class="error-message" th:if="${#fields.hasErrors('email')}"
                     th:each="err : ${#fields.errors('email')}" th:text="${err}"></div>
            </div>
            <div class="form-group">
                <label for="phone">Телефон (международный формат)</label>
                <input type="tel" id="phone" class="form-control" th:field="*{phone}"
                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"
                       placeholder="+7 (999) 123-45-67"/>
                <div class="error-message" th:if="${#fields.hasErrors('phone')}"
                     th:each="err : ${#fields.errors('phone')}" th:text="${err}"></div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                <a href="/user/movies" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</main>
<script>
    let userMenu = document.getElementById('userMenu');
    function toggleUserMenu() { userMenu.classList.toggle('show'); }
    document.addEventListener('click', function(event) { if (!userMenu.contains(event.target)) userMenu.classList.remove('show'); });
    document.addEventListener('DOMContentLoaded', function() { document.querySelectorAll('.flash-message').forEach(msg => { setTimeout(() => { msg.style.animation = 'fadeOut 0.3s ease forwards'; setTimeout(() => msg.remove(), 300); }, 5000); }); });
</script>
</body>
</html>
