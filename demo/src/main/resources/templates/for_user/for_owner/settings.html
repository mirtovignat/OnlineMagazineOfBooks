<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки профиля — Cinema Service</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        /* Дополнительные стили только для этой страницы */
        .settings-container {
            max-width: 680px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .settings-header {
            margin-bottom: 2rem;
        }
        .settings-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e0e7ff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .settings-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: var(--radius-xl);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            box-shadow: var(--shadow-xl);
        }
        .user-badge {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .user-badge-item {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        .user-badge-label {
            color: var(--text-muted);
            font-weight: 500;
        }
        .user-badge-value {
            color: var(--text-light);
            font-weight: 600;
        }
        .user-badge-balance {
            color: var(--glow-success);
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 1.75rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }
        .form-control {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            font-size: 1rem;
            color: var(--text-light);
            transition: all 0.2s;
            font-family: inherit;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--glow-primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
            background: rgba(0,0,0,0.7);
        }
        .form-control.is-invalid {
            border-color: var(--glow-danger);
        }
        .error-message {
            color: var(--glow-danger);
            font-size: 0.75rem;
            margin-top: 0.4rem;
            padding-left: 1rem;
        }
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        .btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.9rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--glow-primary), #1d4ed8);
            color: white;
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59,130,246,0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: var(--text-light);
            border: 1px solid var(--glass-border);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }
        @media (max-width: 550px) {
            .settings-card { padding: 1.5rem; }
            .form-actions { flex-direction: column; }
            .user-badge { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<th:block th:replace="~{fragments/flash-messages :: flashMessages}"></th:block>

<main class="settings-container">
    <div class="settings-header">
        <h1>Настройки профиля</h1>
    </div>
    <div class="settings-card">

        <div class="user-badge" th:if="${wallet != null}">
            <div class="user-badge-item">
                <span class="user-badge-label">Имя пользователя:</span>
                <span class="user-badge-value" th:text="${wallet.username}">—</span>
            </div>
            <div class="user-badge-item" th:if="${wallet.fullName != null}">
                <span class="user-badge-label">Полное имя:</span>
                <span class="user-badge-value" th:text="${wallet.fullName}">—</span>
            </div>
            <div class="user-badge-item">
                <span class="user-badge-label">Баланс:</span>
                <span class="user-badge-balance" th:text="${wallet.balance} + ' ₽'">0 ₽</span>
            </div>
        </div>

        <form th:action="@{/profile/settings/change}" method="post" th:object="${profileSettingsDTO}">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" class="form-control" th:field="*{username}"
                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''" />
                <div class="error-message" th:if="${#fields.hasErrors('username')}"
                     th:each="err : ${#fields.errors('username')}" th:text="${err}"></div>
            </div>
            <div class="form-group">
                <label for="email">Электронная почта</label>
                <input type="email" id="email" class="form-control" th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" />
                <div class="error-message" th:if="${#fields.hasErrors('email')}"
                     th:each="err : ${#fields.errors('email')}" th:text="${err}"></div>
            </div>
            <div class="form-group">
                <label for="phone">Номер телефона</label>
                <input type="tel" id="phone" class="form-control" th:field="*{phone}"
                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''" placeholder="+7 (999) 123-45-67"/>
                <div class="error-message" th:if="${#fields.hasErrors('phone')}"
                     th:each="err : ${#fields.errors('phone')}" th:text="${err}"></div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                <a href="/user/movies" class="btn btn-secondary">Вернуться в меню</a>
            </div>
        </form>
    </div>
</main>

<script th:src="@{/js/main.js}" defer></script>
<script>
    (function() {
        const flashMessages = document.querySelectorAll('.flash-message');
        flashMessages.forEach(msg => {
            setTimeout(() => {
                msg.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => msg.remove(), 300);
            }, 5000);
        });
    })();
</script>
</body>
</html>
