<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Корзина — Cinema Service</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .cart-header{text-align:center;padding:2rem 1rem 1rem;}
        .cart-header h2{font-size:2.5rem;font-weight:700;background:linear-gradient(135deg,#e0e7ff,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .cart-count{display:inline-block;background:var(--card-bg);padding:0.5rem 1.5rem;border-radius:60px;border:1px solid var(--glass-border);}
        .clear-cart-section{text-align:center;margin:2rem 0;}
        .clear-cart-btn{background:transparent;border:1px solid var(--glow-danger);color:var(--glow-danger);padding:0.75rem 2rem;border-radius:60px;font-weight:600;cursor:pointer;transition:0.2s;}
        .clear-cart-btn:hover{background:var(--glow-danger);color:white;box-shadow:0 0 12px #f43f5e;}
        .checkout-btn{background:linear-gradient(135deg,var(--glow-primary),#1d4ed8);color:white;border:none;padding:1rem 3rem;border-radius:60px;font-weight:700;font-size:1.2rem;cursor:pointer;margin:2rem auto;display:inline-flex;align-items:center;gap:0.75rem;transition:0.2s;}
        .checkout-btn:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(59,130,246,0.5);}
        .empty-cart-message{text-align:center;padding:5rem 1rem;}
        .empty-cart-message h3{font-size:2rem;color:var(--text-muted);}
        .browse-movies-btn{background:var(--glow-primary);color:white;padding:1rem 2.5rem;border-radius:60px;text-decoration:none;font-weight:600;display:inline-block;margin-top:2rem;}
    </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<div class="cart-header"><h2>🛒 Ваша корзина</h2>
    <div class="cart-count">Количество фильмов: <span th:text="${cartCount}">0</span></div>
</div>
<th:block th:replace="~{fragments/flash-messages :: flashMessages}"></th:block>
<main>
    <div th:if="${cart == null or cart.isEmpty()}" class="empty-cart-message">
        <h3>😔 Корзина пуста</h3>
        <p style="color: var(--text-muted);">Вы еще не добавили ни одного фильма.</p>
        <a th:href="@{/user/movies}" class="browse-movies-btn">Перейти к каталогу</a>
    </div>
    <div th:unless="${cart == null or cart.isEmpty()}">
        <div class="clear-cart-section">
            <button class="clear-cart-btn" onclick="showClearCartModal()">🗑️ Очистить всю корзину</button>
        </div>
        <form th:action="@{/user/purchases/add/bulk}" method="post" style="text-align:center;"
              th:with="totalPrice=${#aggregates.sum(cart.![unitPriceSnapshot()])}">
            <input type="hidden" name="titles" th:each="cartMovie : ${cart}" th:value="${cartMovie.title()}"/>
            <button type="submit" class="checkout-btn">🛒 Перейти к оплате (<span th:text="${totalPrice}">0</span> ₽)
            </button>
        </form>
        <div class="movies-grid">
            <div class="movie-card" th:each="cartMovie : ${cart}"
                 th:style="'animation-delay: ' + (${cartMovieStat.index} * 0.05) + 's'">
                <a class="movie-poster-link" th:href="@{/user/movies/show/{title}(title=${cartMovie.title()})}">
                    <div class="movie-poster-placeholder"><span>📽️ Постер</span></div>
                </a>
                <div class="movie-card-content">
                    <h3><a th:href="@{/user/movies/show/{title}(title=${cartMovie.title()})}"
                           th:text="${cartMovie.title()}">Название фильма</a></h3>
                    <div class="badges"><span class="badge"
                                              th:text="${#temporals.format(cartMovie.addedAt(), 'dd.MM.yyyy HH:mm')}">01.01.2023 12:00</span>
                    </div>
                    <p class="price" th:text="${cartMovie.unitPriceSnapshot() + ' ₽'}">329.99 ₽</p>
                    <div class="movie-actions">
                        <button class="icon-btn favourite-btn" th:data-movie-title="${cartMovie.title()}"
                                th:data-action="${cartMovie.inFavourites ? 'remove' : 'add'}"
                                onclick="toggleFavourite(this)" title="Добавить в избранное"><span
                                th:text="${cartMovie.inFavourites ? '♥' : '♡'}"></span></button>
                        <button class="icon-btn remove-btn" th:data-movie-title="${cartMovie.title()}"
                                onclick="removeFromCart(this)" title="Удалить из корзины">🗑️
                        </button>
                    </div>
                    <div class="purchase-buttons">
                        <button class="buy-now-btn" th:data-movie-title="${cartMovie.title()}"
                                th:data-movie-price="${cartMovie.unitPriceSnapshot()}" onclick="showBuyModal(this)">
                            Купить сейчас
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<div id="clearCartModal" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="hideClearCartModal()">×</button>
        <h2>Очистка корзины</h2>
        <p>Вы уверены, что хотите очистить всю корзину?</p>
        <p>Будет удалено <span id="cartItemsCount" th:text="${cartCount}">0</span> фильмов.</p>
        <div class="modal-buttons">
            <button class="modal-cancel-btn" onclick="hideClearCartModal()">Отмена</button>
            <button class="modal-confirm-btn" onclick="clearCart()">Очистить корзину</button>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/modals :: buyModal}"></th:block>
<th:block th:replace="~{fragments/modals :: ratingModal}"></th:block>
<script th:src="@{/js/main.js}" defer></script>
<script>
    let movieToRemove = '';
    function showClearCartModal() {
        const currentCartCount = document.querySelectorAll('.movie-card').length;
        const countSpan = document.getElementById('cartItemsCount');
        if (countSpan) countSpan.innerText = currentCartCount;
        document.getElementById('clearCartModal').style.display = 'flex';
    }
    function hideClearCartModal() { document.getElementById('clearCartModal').style.display = 'none'; }
    function clearCart() { var form = document.createElement('form'); form.method = 'POST'; form.action = '/user/cart/clear'; document.body.appendChild(form); form.submit(); }
    function removeFromCart(button) {
        const movieTitle = button.getAttribute('data-movie-title');
        if (!movieTitle) return;
        button.disabled = true;
        fetch('/user/cart/remove/' + encodeURIComponent(movieTitle), { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                showFlashMessage(data.message, 'success', true);
                window.location.reload(); // ← просто перезагружаем страницу
            })
            .catch(() => showFlashMessage('Ошибка при удалении', 'error', true))
            .finally(() => button.disabled = false);
    }
</script>
</body>
</html>
