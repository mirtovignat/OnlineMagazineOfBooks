<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пополнение кошелька</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .deposit-container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            position: relative;
        }
        .deposit-header { text-align: center; margin-bottom: 25px; padding-top: 10px; }
        .deposit-header h2 { color: #333; margin: 0 0 10px 0; font-size: 24px; }
        .deposit-header p { color: #666; margin: 0; font-size: 14px; }
        .balance-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .balance-label { font-size: 14px; opacity: 0.9; }
        .balance-amount { font-size: 24px; font-weight: bold; margin: 5px 0; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .amount-input { position: relative; }
        .currency-symbol {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            font-weight: bold;
            font-size: 16px;
        }
        .amount-input input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 18px;
            transition: all 0.3s;
            background: #f8f9fa;
            text-align: right;
        }
        .amount-input input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .quick-amount-btn {
            padding: 10px;
            border: 2px solid #e1e5e9;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            text-align: center;
        }
        .quick-amount-btn:hover { border-color: #667eea; color: #667eea; transform: translateY(-2px); }
        .quick-amount-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-color: transparent; }
        .payment-methods { margin-bottom: 25px; }
        .payment-methods h3 { margin-bottom: 15px; color: #333; font-size: 16px; }
        .payment-option {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .payment-option:hover { border-color: #667eea; }
        .payment-option.selected { border-color: #667eea; background: rgba(102, 126, 234, 0.05); }
        .payment-option input { margin-right: 10px; }
        .payment-icon { margin-right: 10px; font-size: 20px; color: #667eea; }
        .payment-info h4 { margin: 0 0 5px 0; color: #333; }
        .payment-info p { margin: 0; color: #666; font-size: 12px; }
        .form-actions { display: flex; gap: 15px; }
        .btn-confirm, .btn-menu {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        .btn-confirm { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2); }
        .btn-menu { background: #f8f9fa; color: #666; border: 2px solid #e1e5e9; line-height: 46px; }
        .btn-menu:hover { background: #e9ecef; }
        .error-message { color: #dc3545; font-size: 12px; margin-top: 5px; display: none; }
        .error-message.show { display: block; }
        .has-error { border-color: #dc3545 !important; }
        .flash-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #dc3545;
        }
        .flash-message.success { background: #d4edda; color: #155724; border-left-color: #28a745; }
    </style>
</head>
<body>
<div class="deposit-container">
    <div th:replace="~{fragments/flash-messages :: flashMessages}"></div>

    <div class="deposit-header">
        <h2>Пополнение кошелька</h2>
        <p>Выберите сумму и способ оплаты</p>
    </div>
    <div class="balance-info">
        <div class="balance-label">Текущий баланс</div>
        <div class="balance-amount" th:text="${wallet.balance + ' ' + wallet.currencyCode}"></div>
    </div>
    <form th:action="@{/user/top-up}" th:object="${topUpFormDTO}" method="post" id="depositForm">
        <div class="form-group">
            <label for="amount">Сумма пополнения</label>
            <div class="amount-input">
                <span class="currency-symbol"
                      th:text="${wallet.currencyCode == 'RUB' ? '₽' : (wallet.currencyCode == 'USD' ? '$' : '€')}"></span>
                <input type="number" id="amount" th:field="*{amount}" min="0.01" step="0.01" placeholder="0.00" required>
            </div>
            <div th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}" class="error-message"></div>
            <div class="error-message" id="amountError"></div>
        </div>
        <div class="quick-amounts">
            <button type="button" class="quick-amount-btn" data-amount="100">100</button>
            <button type="button" class="quick-amount-btn" data-amount="500">500</button>
            <button type="button" class="quick-amount-btn" data-amount="1000">1 000</button>
            <button type="button" class="quick-amount-btn" data-amount="5000">5 000</button>
        </div>
        <div class="payment-methods">
            <h3>Способ оплаты</h3>
            <label class="payment-option"><input type="radio" name="paymentMethod" value="CARD" checked>
                <div class="payment-icon">💳</div>
                <div class="payment-info"><h4>Банковская карта</h4>
                    <p>Visa, Mastercard, Мир</p></div>
            </label>
            <label class="payment-option"><input type="radio" name="paymentMethod" value="QIWI">
                <div class="payment-icon">📱</div>
                <div class="payment-info"><h4>QIWI Кошелек</h4>
                    <p>Мгновенное пополнение</p></div>
            </label>
            <label class="payment-option"><input type="radio" name="paymentMethod" value="YANDEX_MONEY">
                <div class="payment-icon">💰</div>
                <div class="payment-info"><h4>ЮMoney</h4>
                    <p>Быстрый перевод</p></div>
            </label>
        </div>
        <div class="form-actions">
            <a href="/user/movies" class="btn-menu">В меню</a>
            <button type="submit" class="btn-confirm">Пополнить</button>
        </div>
    </form>
</div>
<script>
    document.querySelectorAll('.quick-amount-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const amount = this.getAttribute('data-amount');
            document.getElementById('amount').value = amount;
            document.querySelectorAll('.quick-amount-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
        });
    });
    document.querySelectorAll('.payment-option input').forEach(radio => {
        radio.addEventListener('change', function() {
            document.querySelectorAll('.payment-option').forEach(option => option.classList.remove('selected'));
            this.closest('.payment-option').classList.add('selected');
        });
        if (radio.checked) radio.closest('.payment-option').classList.add('selected');
    });
    document.getElementById('depositForm').addEventListener('submit', function(e) {
        const amountInput = document.getElementById('amount');
        const amountError = document.getElementById('amountError');
        let isValid = true;
        amountError.classList.remove('show');
        amountInput.classList.remove('has-error');
        const amount = parseFloat(amountInput.value);
        if (!amount || amount < 0.01) {
            amountError.textContent = 'Минимальная сумма пополнения: 0.01';
            amountError.classList.add('show');
            amountInput.classList.add('has-error');
            isValid = false;
        }
        if (!isValid) e.preventDefault();
    });
    document.getElementById('amount').focus();
    setTimeout(() => {
        document.querySelectorAll('.flash-message').forEach(flashMessage => {
            flashMessage.style.transition = 'opacity 0.5s ease';
            flashMessage.style.opacity = '0';
            setTimeout(() => { if (flashMessage.parentNode) flashMessage.parentNode.removeChild(flashMessage); }, 500);
        });
    }, 5000);
    if (document.querySelector('.flash-message.success')) {
        history.replaceState(null, null, window.location.href);
    }
</script>
</body>
</html>
