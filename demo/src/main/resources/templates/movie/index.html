<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Фильмы — Cinema Service</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .login-button{display:flex;align-items:center;background:linear-gradient(135deg,var(--glow-primary),#1d4ed8);color:white;padding:0.6rem 1.5rem;border-radius:60px;text-decoration:none;font-weight:500;transition:0.2s;}
        .login-button:hover{transform:translateY(-2px);box-shadow:0 6px 14px rgba(59,130,246,0.4);}
        .purchase-buttons{display:flex;gap:0.75rem;margin-top:0.5rem;}
        .cart-btn-large,.buy-btn-large{display:block;width:100%;padding:0.8rem 0.5rem;border-radius:60px;font-weight:600;font-size:0.95rem;text-align:center;border:none;cursor:pointer;transition:0.2s;white-space:nowrap;text-decoration:none;}
        .cart-btn-large{background:linear-gradient(135deg,var(--glow-primary),#1d4ed8);color:white;}
        .cart-btn-large:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(59,130,246,0.4);}
        .buy-btn-large{background:linear-gradient(135deg,var(--glow-success),#059669);color:white;}
        .buy-btn-large:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(16,185,129,0.4);}
        @media (max-width:768px){.purchase-buttons{flex-direction:column;}}
    </style>
</head>
<body>
<header>
    <h1 class="logo-link"><a href="/movies"><img src="/static/favicon.ico" alt="">Cinema Service</a></h1>
    <div class="header-actions"><a th:href="@{/login}" class="login-button">👤 Войти</a></div>
</header>
<main>
    <div th:if="${successMessage}" class="flash-message success" th:text="${successMessage}"></div>
    <div th:if="${notAuthorizedUserExceptionMessage}" class="flash-message error"
         th:text="${notAuthorizedUserExceptionMessage}"></div>
    <div class="movies-grid" th:if="${cardsPage != null and !cardsPage.empty}">
        <div class="movie-card" th:each="movie : ${cardsPage.content}">
            <a th:href="@{/movies/{title}(title=${movie.title})}" class="movie-poster-link">
                <div class="movie-poster-placeholder"><span>📽️ Постер</span></div>
            </a>
            <div class="movie-card-content">
                <h3 th:text="${movie.title}">Название</h3>
                <div class="badges"><span class="badge rating" th:text="${movie.rating}">8.2</span><span
                        class="badge year" th:text="${movie.releaseYear}">2013</span><span class="badge genre"
                                                                                           th:text="${movie.genre}">Комедия</span>
                </div>
                <p class="price" th:text="${movie.price + ' ₽'}">329.99 ₽</p>
                <div class="movie-actions"><a th:href="@{/login}" class="icon-btn favourite-btn"
                                              title="Войдите чтобы добавить в избранное">♡</a><a th:href="@{/login}"
                                                                                                 class="icon-btn rating-btn"
                                                                                                 title="Войдите чтобы оценить">☆</a><a
                        th:href="@{/rated/{title}/reviews(title=${movie.title})}" class="icon-btn comment-btn"
                        title="Отзывы">💬</a></div>
                <div class="purchase-buttons"><a th:href="@{/login}" class="cart-btn-large">В корзину</a><a
                        th:href="@{/login}" class="buy-btn-large">Купить сейчас</a></div>
            </div>
        </div>
    </div>
    <div th:if="${cardsPage == null or cardsPage.empty}" style="text-align:center; padding:4rem 2rem;"><h2
            style="color:#64748b;">Фильмы не найдены</h2></div>
    <div class="pagination" th:if="${cardsPage != null and !cardsPage.empty and cardsPage.totalPages > 1}"><a
            th:if="${cardsPage.hasPrevious()}"
            th:href="@{/movies(page=${cardsPage.number - 1}, size=${cardsPage.size})}">«
        Предыдущая</a><span>Страница <span th:text="${cardsPage.number + 1}">1</span> из <span
            th:text="${cardsPage.totalPages}">1</span></span><a th:if="${cardsPage.hasNext()}"
                                                                th:href="@{/movies(page=${cardsPage.number + 1}, size=${cardsPage.size})}">Следующая
        »</a></div>
</main>
<script th:src="@{/js/main.js}" defer></script>
</body>
</html>
