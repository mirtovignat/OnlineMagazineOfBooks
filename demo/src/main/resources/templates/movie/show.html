<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title th:text="${card.title}">Фильм</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .movie-details{max-width:1200px;margin:2rem auto;padding:0 2rem;display:flex;gap:3rem;}
        .movie-poster{flex:0 0 350px;}
        .movie-poster img{width:100%;height:500px;object-fit:cover;border-radius:32px;box-shadow:0 20px 30px -10px rgba(0,0,0,0.5);}
        .movie-info{flex:1;display:flex;flex-direction:column;gap:1.2rem;}
        .director-block{background:rgba(0,0,0,0.3);border-radius:60px;padding:0.6rem 1.2rem;display:inline-block;}
        .director-name{font-weight:600;}
        .movie-duration{color:var(--text-muted);}
        .icon-group{display:flex;gap:0.75rem;margin:0.5rem 0;}
        .purchase-buttons{display:flex;gap:1rem;margin-top:0.5rem;width:100%;}
        .cart-btn-large,.buy-btn-large{display:block;width:100%;padding:0.9rem 1rem;border-radius:60px;font-weight:600;font-size:1rem;text-align:center;border:none;cursor:pointer;transition:0.2s;white-space:nowrap;text-decoration:none;}
        .cart-btn-large{background:linear-gradient(135deg,var(--glow-primary),#1d4ed8);color:white;}
        .cart-btn-large:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(59,130,246,0.4);}
        .buy-btn-large{background:linear-gradient(135deg,var(--glow-success),#059669);color:white;}
        .buy-btn-large:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(16,185,129,0.4);}
        .login-button{display:flex;align-items:center;background:linear-gradient(135deg,var(--glow-primary),#1d4ed8);color:white;padding:0.6rem 1.5rem;border-radius:60px;text-decoration:none;font-weight:500;transition:0.2s;}
        .login-button:hover{transform:translateY(-2px);box-shadow:0 6px 14px rgba(59,130,246,0.4);}
        @media (max-width:900px){.movie-details{flex-direction:column;align-items:center;}.movie-poster{width:300px;}.movie-poster img{height:450px;}}
    </style>
</head>
<body>
<header>
    <h1 class="logo-link"><a href="/movies"><img src="/static/favicon.ico" alt="">Cinema Service</a></h1>
    <div class="header-actions"><a th:href="@{/login}" class="login-button">👤 Войти</a></div>
</header>
<main class="movie-details">
    <div class="movie-poster"><img th:src="@{/images/posters/{poster}(poster=${card.title+'.jpg'})}" alt="Poster"
                                   src=""></div>
    <div class="movie-info">
        <h1 class="movie-title" th:text="${card.title}">Название</h1>
        <div class="badges"><span class="badge rating" th:text="${card.rating ?: '-'}">8.2</span><span
                class="badge year" th:text="${card.releaseYear ?: '-'}">2013</span><span class="badge genre"
                                                                                         th:text="${card.genre ?: '-'}">Комедия</span>
        </div>
        <div class="director-block"><span class="director-name" th:text="${card.director}">Мартин Скорсезе</span></div>
        <p class="movie-duration"><strong>Длительность:</strong> <span
                th:text="${card.formattedDuration}">3:00:00</span></p>
        <p class="movie-price" th:text="${card.price + ' ₽'}">329.99 ₽</p>
        <div class="icon-group"><a th:href="@{/login}" class="icon-btn favourite-btn"
                                   title="Войдите чтобы добавить в избранное">♡</a><a th:href="@{/login}"
                                                                                      class="icon-btn rating-btn"
                                                                                      title="Войдите чтобы оценить">☆</a><a
                th:href="@{/rated/{title}/reviews(title=${card.title})}" class="icon-btn comment-btn"
                title="Отзывы">💬</a></div>
        <p class="movie-description" th:text="${card.description}">Описание фильма...</p>
        <div class="purchase-buttons"><a th:href="@{/login}" class="cart-btn-large">В корзину</a><a th:href="@{/login}"
                                                                                                    class="buy-btn-large">Купить
            сейчас</a></div>
    </div>
</main>
<script th:src="@{/js/main.js}" defer></script>
</body>
</html>
